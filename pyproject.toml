[project]
name = "scelabs-aegis"
version = "0.1.0"
description = "Public Python client for the Aegis AI stability API"
authors = [
  { name = "SCELabs" }
]
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "httpx>=0.27.0",
]
license = "MIT"
keywords = ["ai", "llm", "stability", "runtime", "agent", "aegis"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Operating System :: OS Independent",
]