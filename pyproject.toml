[project]
name = "aegis-client"
version = "0.1.0"
description = "Public Python client for the Aegis AI stability API"
authors = [
  { name = "SCELabs" }
]
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "requests>=2.31.0",
  "httpx>=0.27.0"
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["aegis*"]
